<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Orders — Now Book Store</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="header-inner">
      <a href="index.html" class="logo">Now Book Store</a>
      <nav class="header-nav">
        <a href="index.html" class="nav-link">Shop</a>
        <a href="orders.html" class="nav-link nav-link-active">My Orders</a>
        <div id="userNav"></div>
      </nav>
      <div class="header-actions">
        <a href="cart.html" class="cart-btn" style="text-decoration:none">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          <span class="cart-count" id="cartCount">0</span>
        </a>
      </div>
    </div>
  </header>

  <main class="orders-page">
    <nav class="breadcrumb">
      <a href="index.html">Shop</a>
      <span>/</span>
      <span>My Orders</span>
    </nav>

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px;">
      <h1 class="orders-page-title" style="margin-bottom:0">My Orders</h1>
      <button class="btn-outline" id="clearOrdersBtn" style="font-size:.85rem;padding:7px 16px;">Clear History</button>
    </div>

    <!-- Empty state -->
    <div class="orders-empty" id="ordersEmpty" hidden>
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>
      <p>No orders yet.</p>
      <a href="index.html" class="btn-outline">Start Shopping</a>
    </div>

    <div id="ordersList"></div>
  </main>

  <footer>
    <p>&copy; 2026 Now Book Store &mdash; Made with love for readers &mdash; <a href="admin.html">Admin</a></p>
  </footer>

  <script src="auth.js"></script>
  <script src="orders.js"></script>
</body>
</html>
